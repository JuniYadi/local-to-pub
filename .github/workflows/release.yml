name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag_version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: tag_version
        run: |
          TAG_VERSION=${{ github.ref_name }}
          NEW_VERSION=${TAG_VERSION#v}
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux amd64 - Client
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            target: bun-linux-x64
            binary: client
          # Linux amd64 - Server
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            target: bun-linux-x64
            binary: server
          # Linux arm64 - Client
          - os: ubuntu-latest
            platform: linux
            arch: arm64
            target: bun-linux-arm64
            binary: client
          # Linux arm64 - Server
          - os: ubuntu-latest
            platform: linux
            arch: arm64
            target: bun-linux-arm64
            binary: server
          # macOS amd64 (Intel) - Client
          - os: macos-latest
            platform: darwin
            arch: amd64
            target: bun-darwin-x64
            binary: client
          # macOS arm64 (Apple Silicon) - Client
          - os: macos-14
            platform: darwin
            arch: arm64
            target: bun-darwin-arm64
            binary: client

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build server
        if: matrix.binary == 'server'
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          bun run scripts/embed-frontend.ts
          bun build ./packages/server/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --outfile=local-to-pub-server

      - name: Build client
        if: matrix.binary == 'client'
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          bun build ./packages/client/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --outfile=local-to-pub

      - name: Prepare artifacts
        run: |
          mkdir dist
          mv local-to-pub* dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/
          retention-days: 7

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package releases
        run: |
          cd artifacts
          for dir in */; do
            BINARY_DIR=$(basename "$dir")
            tar -czf "../local-to-pub-${BINARY_DIR}-${{ needs.version.outputs.version }}.tar.gz" -C "$dir" .
          done

      - name: Calculate checksums
        run: |
          echo "## 📦 Checksums" > checksums.md
          echo "" >> checksums.md
          echo "Verify the integrity of downloaded files:" >> checksums.md
          echo "" >> checksums.md
          echo '```' >> checksums.md
          find . -name "*.tar.gz" -exec shasum -a 256 {} \; | sort >> checksums.md
          echo '```' >> checksums.md
          echo "" >> checksums.md
          echo "To verify a downloaded file, run:" >> checksums.md
          echo "" >> checksums.md
          echo '```bash' >> checksums.md
          echo "shasum -a 256 <downloaded-file> | grep -q \$(cat checksums.txt | grep <downloaded-file> | awk '{print \$1}')" >> checksums.md
          echo '```' >> checksums.md

          find . -name "*.tar.gz" -exec shasum -a 256 {} \; | sort > checksums.txt

      - name: Generate release notes
        run: |
          gh api \
            --method POST \
            repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ github.ref_name }}" \
            -f target_commitish="${{ github.sha }}" \
            --jq .body > generated-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compose release body
        run: bun run scripts/compose-release-notes.ts generated-notes.md checksums.md > release-body.md

      - name: Create or update release
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release edit "${{ github.ref_name }}" --title "v${{ needs.version.outputs.version }}" --notes-file release-body.md
            gh release upload "${{ github.ref_name }}" *.tar.gz checksums.txt --clobber
          else
            gh release create "${{ github.ref_name }}" *.tar.gz checksums.txt --title "v${{ needs.version.outputs.version }}" --notes-file release-body.md --verify-tag
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
